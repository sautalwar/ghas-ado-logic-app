name: Container scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  image-scan:
    name: Build image and scan with Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build demo image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/container-scanning-demo:${{ github.sha }}

      - name: Run Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/container-scanning-demo:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          vuln-type: os,library
          severity: MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload image scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: container-image

      - name: Print image scan summary
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/container-scanning-demo:${{ github.sha }}
          format: table
          vuln-type: os,library
          severity: MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

  dockerfile-scan:
    name: Scan Dockerfile configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy config scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-dockerfile-results.sarif
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Dockerfile scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-dockerfile-results.sarif
          category: dockerfile-misconfig

      - name: Print Dockerfile scan summary
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: table
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "0"
